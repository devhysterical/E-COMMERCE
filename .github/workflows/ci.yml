name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # Secret Scanning — chặn secrets bị commit
  # ============================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          echo "🔍 Scanning tracked files for hardcoded secrets..."
          FOUND=0

          # Patterns: JWT tokens, private keys, common password/secret assignments
          PATTERNS=(
            'eyJhbGciOi'
            'PRIVATE KEY'
            'GOCSPX-'
            'sk_live_'
            'sk_test_'
            'AKIA[0-9A-Z]{16}'
            'smtp_pass'
            'password.*=.*["\x27].{8,}'
          )

          # Only scan tracked source files; exclude non-source directories and files
          FILES=$(git ls-files -- ':!*.lock' ':!package-lock.json' ':!*.env.example' ':!.github/workflows/ci.yml' ':!.agent/**' ':!.shared/**' ':!**/dist/**' ':!*.map' ':!*.csv')

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(echo "$FILES" | xargs grep -rlnE "$pattern" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "🔴 BLOCKED — Pattern '$pattern' found in:"
              echo "$MATCHES" | while read -r file; do
                echo "   → $file"
              done
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "❌ Secret scan FAILED. Remove hardcoded secrets before pushing."
            echo "   Use environment variables or GitHub Secrets instead."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected."

  # ============================================
  # Backend CI
  # ============================================
  backend:
    name: Backend CI
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test -- --ci --passWithNoTests

      - name: Build
        run: npm run build

  # ============================================
  # Frontend CI
  # ============================================
  frontend:
    name: Frontend CI
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes TypeScript check)
        run: npm run build
