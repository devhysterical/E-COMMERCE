name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # Secret Scanning — chặn secrets bị commit
  # ============================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.0

      - name: Install Gitleaks
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          mkdir -p "$GOBIN"
          go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan tracked files with Gitleaks
        env:
          GITLEAKS_BIN: ${{ runner.temp }}/bin/gitleaks
          SCAN_DIR: ${{ runner.temp }}/gitleaks-target
        run: |
          echo "🔍 Scanning tracked files with Gitleaks..."
          rm -rf "$SCAN_DIR"
          mkdir -p "$SCAN_DIR"

          # Scan only tracked files from the checked-out revision.
          # This keeps CI deterministic and avoids local-only files such as .env or dist artifacts.
          git archive --format=tar HEAD | tar -xf - -C "$SCAN_DIR"

          "$GITLEAKS_BIN" dir "$SCAN_DIR" \
            --no-banner \
            --no-color \
            --redact \
            --exit-code 1

          echo "✅ No hardcoded secrets detected."

  # ============================================
  # Backend CI
  # ============================================
  backend:
    name: Backend CI
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test -- --ci --passWithNoTests

      - name: Build
        run: npm run build

  # ============================================
  # Frontend CI
  # ============================================
  frontend:
    name: Frontend CI
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:run

      - name: Build (includes TypeScript check)
        run: npm run build
